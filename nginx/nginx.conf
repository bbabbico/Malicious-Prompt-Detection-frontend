worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 1차 방어선: 단일 IP에서 초당 20번 이상의 무차별 연결 시도 차단 (DDoS 방어)
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=20r/s;

    upstream fastapi_backend {
        server api_server:8000;
    }

    upstream frontend_server {
        server frontend:80;
    }

    server {
        listen 80;
        server_name localhost;

        # API 요청 처리
        location /api/ {
            limit_req zone=ip_limit burst=10 nodelay;
            proxy_pass http://fastapi_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 프론트엔드 정적 파일 처리 및 라우팅
        location / {
            proxy_pass http://frontend_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
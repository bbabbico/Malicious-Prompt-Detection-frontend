services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: prompt_guard
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  api_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=mysql+aiomysql://user:user_password@db/prompt_guard
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=your_jwt_secret_key
    volumes:
      - ./server:/app
    # Using 'api_server' as the hostname for nginx upstream

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_server
      - frontend

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    # Internal port 80 is served by nginx service on external port 80

volumes:
  db_data:

networks:
  default:
    name: malicious-prompt-detection-network

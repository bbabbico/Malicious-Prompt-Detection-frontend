worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 💡 1차 방어선: 단일 IP에서 초당 20번 이상의 무차별 연결 시도 차단 (DDoS 방어)
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=20r/s;

    upstream fastapi_backend {
        server api_server:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            # 위에서 설정한 제한 적용 (순간적인 버스트 10개까지는 큐에서 대기 허용)
            limit_req zone=ip_limit burst=10 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}